<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator - Final Stable Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-cyan: #00d4ff; --bg-dark: #001524; --panel-bg: rgba(0, 21, 36, 0.92); --sos-red: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: sans-serif; color: white; }
        #map { height: 100%; width: 100%; }
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.3) sepia(0.3); }

        #info-panel { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--panel-bg); color: var(--main-cyan); 
            padding: 12px; border-radius: 20px; border: 1px solid var(--main-cyan); 
            display: flex; gap: 5px; backdrop-filter: blur(5px); width: 95%; max-width: 520px;
            justify-content: space-around; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .info-item { text-align: center; min-width: 45px; }
        .info-label { font-size: 7px; text-transform: uppercase; opacity: 0.8; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 800; }

        .controls-left { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .controls-right { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        
        .btn { border: none; padding: 10px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.3); min-width: 140px; color: #333; }
        .btn-sos { background: var(--sos-red); color: white; animation: pulse 2s infinite; border: 2px solid white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .btn-white { background: #ffffff; }
        .btn-red { background: #ff5252; color: white; }
        .btn-blue { background: var(--main-cyan); color: #001524; }
        .btn-purple { background: #a855f7; color: white; }
        .btn-active { background: #ff9800 !important; color: white !important; }

        .modal { display: none; position: fixed; z-index: 3000; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #0d2131; color: white; padding: 25px; border-radius: 18px; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .close-x { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #888; cursor: pointer; }
        
        .fuel-icon { background: #ff9800; color: white; border-radius: 4px; border: 1px solid white; text-align: center; line-height: 22px; font-size: 14px; width: 24px; height: 24px; }
        .shop-icon { background: #9c27b0; color: white; border-radius: 4px; border: 1px solid white; text-align: center; line-height: 22px; font-size: 14px; width: 24px; height: 24px; }
    </style>
</head>
<body>

<div id="sos-modal" class="modal">
    <span class="close-x" onclick="closeModal('sos-modal')">&times;</span>
    <h2 style="color:var(--sos-red); text-align:center;">SOS / LARM</h2>
    <div style="background: #1a0000; border: 2px solid var(--sos-red); padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0;">
        <div id="sos-lat" style="font-family: monospace; font-size: 16px; color: #ff5252; font-weight: bold;">Söker position...</div>
        <div id="sos-lon" style="font-family: monospace; font-size: 16px; color: #ff5252; font-weight: bold;"></div>
    </div>
    <a href="tel:112"><button style="width:100%; padding:18px; background:var(--sos-red); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px;">RING 112</button></a>
</div>

<div id="settings-modal" class="modal">
    <span class="close-x" onclick="closeModal('settings-modal')">&times;</span>
    <h3>⛽ Johnson 8hk Inställningar</h3>
    <label style="font-size:11px;">Lågfart (l/nm):</label>
    <input type="number" id="burn-low" step="0.1" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:none;">
    <label style="font-size:11px;">Marsch (l/nm):</label>
    <input type="number" id="burn-high" step="0.1" style="width:100%; padding:10px; margin-bottom:15px; background:#222; color:white; border:none;">
    <button style="width:100%; padding:15px; background:#76b852; color:white; border:none; border-radius:8px;" onclick="saveSettings()">SPARA</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Liter</div><div id="fuel" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">ETA</div><div id="eta" class="info-value">--:--</div></div>
    <div class="info-item"><div class="info-label">Batt</div><div id="batt" class="info-value">--%</div></div>
    <div class="info-item"><div class="info-label">Kurs</div><div id="heading" class="info-value">0°</div></div>
</div>

<div class="controls-left">
    <button class="btn btn-sos" onclick="openSOS()">🆘 NÖD / SOS</button>
    <button class="btn btn-white" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn btn-white" onclick="toggleNight()">🌙 NATT-LÄGE</button>
    <button class="btn btn-red" onclick="clearRoute()">🗑️ RENSA RUTT</button>
</div>

<div class="controls-right">
    <button class="btn btn-purple" onclick="openModal('settings-modal')">⛽ MOTOR</button>
    <button id="anchor-btn" class="btn" style="background:#333; color:white;" onclick="toggleAnchorGuard()">⚓ ANKARVAKT</button>
    <button class="btn btn-blue" onclick="goHome()">🏠 HITTA HEM</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    var boatIcon = L.divIcon({ html: '<div id="boat-arrow" style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:22px solid #ff3e3e;transition:transform 0.5s;"></div>', iconSize:[16,22], iconAnchor:[8,11] });
    var marker = L.marker([57.62, 11.93], {icon: boatIcon}).addTo(map);

    var routePoints = [], routeLine = L.polyline([], {color:'#f1c40f', weight:4, dashArray:'10,10'}).addTo(map);
    map.on('click', e => {
        routePoints.push(e.latlng);
        routeLine.setLatLngs(routePoints);
        L.circleMarker(e.latlng, {radius:6, color:'#f1c40f', fillOpacity:1, className:'route-dot'}).addTo(map);
        updateETA();
    });

    var poi = [
        { name: "Donsö Sjömack", pos: [57.598, 11.798], type: "fuel" },
        { name: "Tempo Vrångö", pos: [57.575, 11.783], type: "shop" },
        { name: "Långedrag Mack", pos: [57.669, 11.861], type: "fuel" }
    ];
    poi.forEach(p => {
        var pIcon = L.divIcon({ className: p.type === "fuel" ? "fuel-icon" : "shop-icon", html: p.type === "fuel" ? "⛽" : "🛒", iconSize: [24, 24] });
        L.marker(p.pos, {icon: pIcon}).addTo(map).bindPopup(p.name);
    });

    var totalFuel = 0, lastPos = null, lastKnt = 0, isAnchorActive = false, anchorCircle = null;

    if(navigator.getBattery) { navigator.getBattery().then(b => { const u = () => { document.getElementById('batt').innerText = Math.round(b.level * 100) + "%"; }; u(); b.onlevelchange = u; }); }

    function updateETA() {
        if(routePoints.length > 0 && lastKnt > 1) {
            let d = marker.getLatLng().distanceTo(routePoints[routePoints.length-1]) / 1852;
            let eta = new Date(new Date().getTime() + (d/lastKnt)*3600000);
            document.getElementById('eta').innerText = eta.getHours() + ":" + (eta.getMinutes()<10?'0':'') + eta.getMinutes();
        }
    }

    function openSOS() { document.getElementById('sos-lat').innerText = "LAT: " + marker.getLatLng().lat.toFixed(5); document.getElementById('sos-lon').innerText = "LON: " + marker.getLatLng().lng.toFixed(5); openModal('sos-modal'); }
    function clearRoute() { routePoints = []; routeLine.setLatLngs([]); map.eachLayer(l => { if(l.options && l.options.className === 'route-dot') map.removeLayer(l); }); document.getElementById('eta').innerText = "--:--"; }
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function saveSettings() { localStorage.setItem('burnLow', document.getElementById('burn-low').value); localStorage.setItem('burnHigh', document.getElementById('burn-high').value); closeModal('settings-modal'); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
    function centerMap() { map.panTo(marker.getLatLng()); }
    function goHome() { map.flyTo([57.621, 11.934], 14); }

    function toggleAnchorGuard() {
        if (!isAnchorActive) { anchorCircle = L.circle(marker.getLatLng(), { radius: 30, color: '#00d4ff' }).addTo(map); isAnchorActive = true; document.getElementById('anchor-btn').classList.add('btn-active'); }
        else { if(anchorCircle) map.removeLayer(anchorCircle); isAnchorActive = false; document.getElementById('anchor-btn').classList.remove('btn-active'); }
    }

    navigator.geolocation.watchPosition(p => {
        let cur = L.latLng(p.coords.latitude, p.coords.longitude);
        marker.setLatLng(cur);
        lastKnt = (p.coords.speed || 0) * 1.9438;
        document.getElementById('speed').innerText = lastKnt.toFixed(1);
        document.getElementById('heading').innerText = Math.round(p.coords.heading || 0) + "°";
        document.getElementById('boat-arrow').style.transform = `rotate(${p.coords.heading || 0}deg)`;
        if(lastPos) {
            let d = cur.distanceTo(lastPos) / 1852;
            let burn = lastKnt > 4 ? (localStorage.getItem('burnHigh')||0.5) : (localStorage.getItem('burnLow')||0.2);
            totalFuel += (d * burn);
            document.getElementById('fuel').innerText = totalFuel.toFixed(1);
        }
        if (isAnchorActive && cur.distanceTo(anchorCircle.getLatLng()) > 30) { alert("LARM: Ankare driver!"); }
        lastPos = cur;
    }, null, { enableHighAccuracy: true });

    window.onload = () => {
        document.getElementById('burn-low').value = localStorage.getItem('burnLow') || 0.2;
        document.getElementById('burn-high').value = localStorage.getItem('burnHigh') || 0.5;
    };
</script>
</body>
</html>
