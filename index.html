<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator Pro+</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#001524">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; transition: filter 0.5s; }
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) opacity(0.8) sepia(100%) saturate(500%) hue-rotate(-50deg); }
        
        #info-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0, 21, 36, 0.92); color: #00d4ff; 
            padding: 12px 20px; border-radius: 25px; border: 1px solid #00d4ff; 
            display: flex; gap: 12px; backdrop-filter: blur(8px); pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        
        .info-item { text-align: center; min-width: 48px; }
        .info-label { font-size: 8px; text-transform: uppercase; opacity: 0.7; letter-spacing: 0.5px; }
        .info-value { font-size: 17px; font-weight: 800; }

        #hazard-warning { 
            display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: #ff1a1a; color: white; padding: 20px; border-radius: 12px; 
            font-weight: bold; font-size: 18px; text-align: center; animation: blink 0.8s infinite; border: 4px solid white;
        }

        @keyframes blink { 0% {transform: translateX(-50%) scale(1);} 50% {transform: translateX(-50%) scale(1.05);} 100% {transform: translateX(-50%) scale(1);} }

        .controls { position: absolute; z-index: 1000; display: flex; flex-direction: column; gap: 6px; top: 10px; left: 10px; }
        .btn { 
            background: #ffffff; border: none; padding: 10px 14px; border-radius: 8px; 
            font-weight: 900; cursor: pointer; font-size: 11px; color: #000; 
            text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        #center-btn { border: 2px solid #00d4ff; }
        #night-btn { background: #4ec3f7; }
        #clear-btn { background: #ff5252; color: white; }
        
        .top-right-btns { position: absolute; top: 10px; right: 10px; z-index: 1000; }
        #audio-btn { background: #4CAF50; color: white; padding: 10px 15px; border-radius: 8px; font-weight: 900; border:none; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        #mute-btn { background: rgba(0,0,0,0.5); color: white; border: 1px solid #00d4ff; display: none; padding: 10px 15px; border-radius: 8px; font-weight: 900; }
        
        .boat-container { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .boat-arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 25px solid #ff3e3e; filter: drop-shadow(0 0 2px rgba(0,0,0,1)); }
        #wind-dir-icon { display: inline-block; transition: transform 1s; font-weight: bold; }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ GRUND NÄRA!<br><small id="dist-text"></small></div>

<div class="top-right-btns">
    <button id="audio-btn" onclick="enableAudio()">🛰️ AKTIVERA SYSTEM</button>
    <button id="mute-btn" onclick="toggleMute()">🔇 LJUD PÅ</button>
</div>

<div class="controls">
    <button id="center-btn" class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button id="night-btn" class="btn" onclick="toggleNight()">🌙 NATT-LÄGE</button>
    <button id="clear-btn" class="btn" onclick="clearRoute()">🗑️ RENSA RUTT</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Kurs</div><div id="course" class="info-value">---°</div></div>
    <div class="info-item"><div class="info-label">Djup</div><div id="depth" class="info-value">--</div><div style="font-size: 7px;">meter</div></div>
    <div class="info-item"><div class="info-label">Vind</div><div id="wind-speed" class="info-value">--</div><div style="font-size: 7px;"><span id="wind-dir-icon">↑</span> m/s</div></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const WEATHER_API_KEY = 'e48efe6e08a9c83ecbd88fbb817431b9'; 
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    var boatIcon = L.divIcon({ className: 'custom-boat-icon', html: '<div id="boat-dir" class="boat-container"><div class="boat-arrow"></div></div>', iconSize: [30, 30], iconAnchor: [15, 15] });
    var marker = L.marker([0,0], {icon: boatIcon}).addTo(map);
    var audioCtx = null, audioEnabled = false, isMuted = false, hazards = [];

    function enableAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
        document.getElementById('audio-btn').style.display = 'none';
        document.getElementById('mute-btn').style.display = 'block';
        updateAll();
        beep(440);
    }

    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔊 LJUD AV" : "🔇 LJUD PÅ"; }
    function beep(freq = 880) { if (!audioEnabled || !audioCtx || isMuted) return; var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }

    async function updateWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric`);
            const data = await res.json();
            if(data.wind) {
                document.getElementById('wind-speed').innerText = data.wind.speed.toFixed(1);
                document.getElementById('wind-dir-icon').style.transform = `rotate(${data.wind.deg + 180}deg)`;
            }
        } catch (e) { console.log(e); }
    }

    async function updateDepthAndHazards(lat, lon) {
        const query = `[out:json];(node["seamark:type"](around:1000,${lat},${lon});node["seamark:depth"](around:1000,${lat},${lon}););out;`;
        try {
            const res = await fetch(`https://overpass-api.interpretation/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            hazards = data.elements;
            let depthFound = "--";
            let minD = 2000;
            data.elements.forEach(el => {
                if(el.tags && el.tags["seamark:depth"]) {
                    let d = map.distance([lat, lon], [el.lat, el.lon]);
                    if(d < minD) { minD = d; depthFound = el.tags["seamark:depth"]; }
                }
            });
            document.getElementById('depth').innerText = depthFound;
        } catch (e) { console.log(e); }
    }

    function checkHazards(lat, lon) {
        let nearest = 1000;
        hazards.forEach(h => {
            if(h.tags && h.tags["seamark:type"] && (h.tags["seamark:type"].includes("hazard") || h.tags["seamark:type"] === "rock")) {
                let d = map.distance([lat, lon], [h.lat, h.lon]);
                if (d < nearest) nearest = d;
            }
        });
        if (nearest < 150) { 
            document.getElementById('hazard-warning').style.display = 'block';
            document.getElementById('dist-text').innerText = Math.round(nearest) + " m till hinder";
            beep(880);
        } else { document.getElementById('hazard-warning').style.display = 'none'; }
    }

    function updateAll() {
        let pos = marker.getLatLng();
        if(pos.lat !== 0) { updateWeather(pos.lat, pos.lng); updateDepthAndHazards(pos.lat, pos.lng); }
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(function(p) {
            marker.setLatLng([p.coords.latitude, p.coords.longitude]);
            if (p.coords.heading !== null) { document.getElementById('boat-dir').style.transform = `rotate(${p.coords.heading}deg)`; document.getElementById('course').innerHTML = Math.round(p.coords.heading) + "°"; }
            if(p.coords.speed) document.getElementById('speed').innerHTML = (p.coords.speed * 1.9438).toFixed(1);
            checkHazards(p.coords.latitude, p.coords.longitude);
        }, null, { enableHighAccuracy: true });
        setInterval(updateAll, 120000);
    }
    function centerMap() { var p = marker.getLatLng(); if (p.lat !== 0) map.flyTo(p, 16); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
</script>
</body>
</html>
