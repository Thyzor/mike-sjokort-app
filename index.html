<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator - Depth Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --main-cyan: #00d4ff;
            --bg-dark: #001524;
            --panel-bg: rgba(0, 21, 36, 0.95);
            --sos-red: #ff0000;
        }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            background-color: var(--bg-dark); font-family: sans-serif; color: white;
            transition: background 0.4s;
        }
        #map { height: 100%; width: 100%; }

        .hazard-alarm { animation: flash-red 0.6s infinite; }
        @keyframes flash-red { 0% { background: var(--bg-dark); } 50% { background: #600; } 100% { background: var(--bg-dark); } }

        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.3) sepia(0.3); }

        #info-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--panel-bg); color: var(--main-cyan); 
            padding: 10px 12px; border-radius: 20px; border: 1px solid var(--main-cyan); 
            display: flex; gap: 6px; backdrop-filter: blur(8px); width: 98%; max-width: 650px;
            justify-content: space-around; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .info-item { text-align: center; min-width: 42px; }
        .info-label { font-size: 7px; text-transform: uppercase; opacity: 0.8; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 800; }
        .depth-value { color: #ffffff; text-shadow: 0 0 5px var(--main-cyan); }

        .controls-left, .controls-right {
            position: absolute; top: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }
        .controls-left { left: 10px; }
        .controls-right { right: 10px; align-items: flex-end; }
        
        .btn {
            border: none; padding: 10px 14px; border-radius: 8px; font-weight: 700;
            cursor: pointer; font-size: 10px; text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); min-width: 140px; color: #333;
        }
        .btn-sos { background: var(--sos-red); color: white; animation: pulse 2s infinite; border: 2px solid white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .btn-white { background: #ffffff; }
        .btn-blue { background: var(--main-cyan); color: #001524; }
        .btn-purple { background: #a855f7; color: white; }
        .btn-orange { background: #ff9800; color: white; }
        .btn-red { background: #ff5252; color: white; }
        .btn-active { background: #ff9800 !important; color: white !important; }

        .modal {
            display: none; position: fixed; z-index: 3000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: #0d2131; color: white; padding: 25px; border-radius: 18px;
            width: 92%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-height: 85vh; overflow-y: auto;
        }
        .close-x { position: absolute; top: 15px; right: 15px; font-size: 28px; color: #888; cursor: pointer; }
        
        .toast {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: #222; color: #fff; padding: 12px 20px; border-radius: 12px;
            z-index: 4000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); display: none;
            text-align: center; width: 85%;
        }
        .toast-hazard { background: #ff0000 !important; font-weight: bold; animation: pulse 0.5s infinite; border: 2px solid white; }
    </style>
</head>
<body id="main-body">

<div id="sos-modal" class="modal">
    <span class="close-x" onclick="closeModal('sos-modal')">×</span>
    <h2 style="color:var(--sos-red); text-align:center;">🆘 NÖDSITUATION</h2>
    <div style="background: #1a0000; border: 2px solid var(--sos-red); padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0;">
        <div id="sos-lat" style="font-family: monospace; font-size: 18px; color: #ff5252; font-weight: bold;">Söker...</div>
        <div id="sos-lon" style="font-family: monospace; font-size: 18px; color: #ff5252; font-weight: bold;"></div>
    </div>
    <a href="tel:112"><button style="width:100%; padding:18px; background:var(--sos-red); color:white; border:none; border-radius:12px; font-weight:bold; font-size:18px; margin-bottom:12px;">RING 112</button></a>
    <button onclick="copySOSCoords()" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:8px;">📋 KOPIERA KOORDINATER</button>
</div>

<div id="settings-modal" class="modal">
    <span class="close-x" onclick="closeModal('settings-modal')">×</span>
    <h3 style="color:var(--main-cyan);">🤖 Motor-AI (Johnson 8hk)</h3>
    <label style="font-size:11px;">Lågfart (l/nm):</label>
    <input type="number" id="burn-low" step="0.05" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444;">
    <label style="font-size:11px;">Marschfart (l/nm):</label>
    <input type="number" id="burn-high" step="0.05" style="width:100%; padding:10px; margin-bottom:20px; background:#222; color:white; border:1px solid #444;">
    <button style="width:100%; padding:15px; background:#76b852; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="saveSettings()">SPARA</button>
    <button style="width:100%; padding:12px; background:#ff5252; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;" onclick="resetTrip()">RENSA TRIPPMÄTARE</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Djup</div><div id="cur-depth" class="info-value depth-value">>6m</div></div>
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Liter</div><div id="fuel" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Tid kvar</div><div id="rem-time" class="info-value">0m</div></div>
    <div class="info-item"><div class="info-label">ETA</div><div id="eta" class="info-value">--:--</div></div>
    <div class="info-item"><div class="info-label">Batt</div><div id="batt" class="info-value">--%</div></div>
    <div class="info-item"><div class="info-label">Kurs</div><div id="heading" class="info-value">0°</div></div>
</div>

<div class="controls-left">
    <button class="btn btn-sos" onclick="openSOS()">🆘 NÖD / SOS</button>
    <button class="btn btn-white" onclick="centerMap()">📍 CENTRERA</button>
    <button id="sim-btn" class="btn btn-orange" onclick="toggleSimulation()">🚢 SIMULERA RUTT</button>
    <button class="btn btn-red" onclick="clearRoute()">🗑️ RENSA RUTT</button>
    <button class="btn btn-blue" onclick="goHome()">🏠 HEM</button>
</div>

<div class="controls-right">
    <button class="btn btn-purple" onclick="openModal('settings-modal')">🤖 MOTOR-AI</button>
    <button class="btn btn-white" onclick="toggleNight()">🌙 NATT</button>
    <button id="anchor-btn" class="btn" style="background:#333; color:white;" onclick="toggleAnchorGuard()">⚓ ANKARVAKT</button>
</div>

<div id="toast" class="toast"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Sjökortsdata baserat på dina inskickade bilder
    const HAZARDS = [
        { name: "Hult-grynna", pos: [57.625, 11.900], radius: 60, depth: "0.8m" },
        { name: "Askim-skär", pos: [57.610, 11.915], radius: 70, depth: "1.1m" },
        { name: "Valö-grund", pos: [57.553, 11.794], radius: 80, depth: "0.4m" },
        { name: "Kullavik-bränning", pos: [57.557, 11.928], radius: 60, depth: "1.2m" },
        { name: "Amundö-grynna", pos: [57.618, 11.905], radius: 60, depth: "0.7m" },
        { name: "Särö-västerskär", pos: [57.505, 11.910], radius: 75, depth: "0.3m" }
    ];

    const CONFIG = { burnLow: 0.2, burnHigh: 0.5, anchorRadius: 30 };
    let state = { totalFuel: parseFloat(localStorage.getItem('totalFuel')) || 0, lastPos: null, lastKnt: 0, isAnchorActive: false, anchorCircle: null, routePoints: [], isSimulating: false, simInterval: null, simIndex: 0, simKnt: 6.0 };

    const els = { 
        speed: document.getElementById('speed'), 
        fuel: document.getElementById('fuel'), 
        eta: document.getElementById('eta'), 
        remTime: document.getElementById('rem-time'), 
        batt: document.getElementById('batt'), 
        heading: document.getElementById('heading'), 
        depth: document.getElementById('cur-depth'),
        toast: document.getElementById('toast'), 
        simBtn: document.getElementById('sim-btn'),
        sosLat: document.getElementById('sos-lat'),
        sosLon: document.getElementById('sos-lon')
    };

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    const boatIcon = L.divIcon({ html: '<div id="boat-arrow" style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:22px solid #ff3e3e;transition:transform 0.4s linear;"></div>', iconSize: [16, 22], iconAnchor: [8, 11] });
    const marker = L.marker([57.62, 11.93], {icon: boatIcon}).addTo(map);
    const routeLine = L.polyline([], {color:'#f1c40f', weight:4, dashArray:'8,8'}).addTo(map);

    // Rita ut djuphazards som genomskinliga röda cirklar
    HAZARDS.forEach(h => {
        L.circle(h.pos, {radius: h.radius, color: 'red', weight: 1, fillOpacity: 0.1}).addTo(map);
    });

    function handlePosition(pos) {
        const lat = pos.coords ? pos.coords.latitude : pos.lat;
        const lng = pos.coords ? pos.coords.longitude : pos.lng;
        const cur = L.latLng(lat, lng);
        marker.setLatLng(cur);

        // Beräkna fart och kurs
        state.lastKnt = pos.coords ? (pos.coords.speed || 0) * 1.9438 : (pos.speed || 0);
        els.speed.textContent = state.lastKnt.toFixed(1);
        const heading = pos.coords ? (pos.coords.heading || 0) : (pos.heading || 0);
        els.heading.textContent = Math.round(heading) + "°";
        document.getElementById('boat-arrow').style.transform = `rotate(${heading}deg)`;

        // DJUP-LOGIK: Kolla om vi är i en känd riskzon
        let currentDepthText = ">6m";
        HAZARDS.forEach(h => {
            const dist = cur.distanceTo(L.latLng(h.pos));
            if (dist < h.radius) {
                currentDepthText = h.depth;
                // Om vi är riktigt nära, visa en röd varningstext
                if (dist < h.radius * 0.7) {
                    showToast(`⚠️ GRUNDSTÖTNINGSRISK: ${h.depth}!`, true);
                }
            } else if (dist < h.radius * 2) {
                // Nära en zon, visa ett estimat (mellan 2 och 6 meter)
                if (currentDepthText === ">6m") currentDepthText = "~3-5m";
            }
        });
        els.depth.textContent = currentDepthText;

        // Bränsleberäkning
        if (state.lastPos) {
            const distNm = state.lastPos.distanceTo(cur) / 1852;
            const rate = state.lastKnt > 4 ? (parseFloat(localStorage.getItem('burnHigh')) || CONFIG.burnHigh) : (parseFloat(localStorage.getItem('burnLow')) || CONFIG.burnLow);
            state.totalFuel += distNm * rate;
            els.fuel.textContent = state.totalFuel.toFixed(1);
            localStorage.setItem('totalFuel', state.totalFuel);
        }

        // Ankarvakt
        if (state.isAnchorActive && state.anchorCircle) {
            if (cur.distanceTo(state.anchorCircle.getLatLng()) > CONFIG.anchorRadius) showToast("🚨 ANKARE DRIVER!", true);
        }

        state.lastPos = cur;
        updateETA();
    }

    function updateETA() {
        if (state.routePoints.length > 0 && state.lastKnt > 0.1) {
            const d = marker.getLatLng().distanceTo(state.routePoints[state.routePoints.length-1]) / 1852;
            const h = d / state.lastKnt;
            const m = Math.round(h * 60);
            els.remTime.textContent = m >= 60 ? Math.floor(m/60)+"t "+(m%60)+"m" : m+"m";
            const eta = new Date(Date.now() + h * 3600000);
            els.eta.textContent = eta.getHours() + ":" + (eta.getMinutes() < 10 ? '0' : '') + eta.getMinutes();
        } else {
            els.remTime.textContent = "0m"; els.eta.textContent = "--:--";
        }
    }

    function toggleSimulation() {
        if (state.routePoints.length < 2) { showToast("Plottra rutt först!"); return; }
        if (state.isSimulating) {
            clearInterval(state.simInterval);
            state.isSimulating = false;
            els.simBtn.classList.remove('btn-active');
            els.simBtn.textContent = "🚢 SIMULERA RUTT";
        } else {
            const k = prompt("Hastighet (knop):", "6.0");
            if (k === null) return;
            state.simKnt = parseFloat(k) || 6.0;
            state.isSimulating = true; state.simIndex = 0;
            els.simBtn.classList.add('btn-active');
            els.simBtn.textContent = "⏹ STOPPA SIM";
            state.simInterval = setInterval(() => {
                if (state.simIndex >= state.routePoints.length) { toggleSimulation(); return; }
                handlePosition({ lat: state.routePoints[state.simIndex].lat, lng: state.routePoints[state.simIndex].lng, speed: state.simKnt, heading: 0 });
                state.simIndex++;
            }, 1000);
        }
    }

    function showToast(msg, isHazard = false) {
        els.toast.innerHTML = msg;
        els.toast.style.display = 'block';
        if (isHazard) {
            els.toast.classList.add('toast-hazard');
            document.getElementById('main-body').classList.add('hazard-alarm');
        }
        setTimeout(() => {
            els.toast.style.display = 'none';
            els.toast.classList.remove('toast-hazard');
            document.getElementById('main-body').classList.remove('hazard-alarm');
        }, 3000);
    }

    function openSOS() {
        const p = marker.getLatLng();
        els.sosLat.textContent = "LAT: " + p.lat.toFixed(5);
        els.sosLon.textContent = "LON: " + p.lng.toFixed(5);
        openModal('sos-modal');
    }

    function copySOSCoords() {
        navigator.clipboard.writeText(`${els.sosLat.innerText} ${els.sosLon.innerText}`).then(() => showToast("Koordinater kopierade!"));
    }

    function clearRoute() {
        state.routePoints = [];
        routeLine.setLatLngs([]);
        map.eachLayer(l => { if (l.options && l.options.className === 'route-dot') map.removeLayer(l); });
        showToast("Rutt rensad");
    }

    function resetTrip() {
        state.totalFuel = 0;
        localStorage.setItem('totalFuel', 0);
        els.fuel.textContent = "0.0";
        showToast("Trippmätare nollställd");
    }

    function saveSettings() {
        localStorage.setItem('burnLow', document.getElementById('burn-low').value);
        localStorage.setItem('burnHigh', document.getElementById('burn-high').value);
        closeModal('settings-modal');
        showToast("Inställningar sparade");
    }

    function toggleAnchorGuard() {
        if (!state.isAnchorActive) {
            state.anchorCircle = L.circle(marker.getLatLng(), { radius: CONFIG.anchorRadius, color: '#00d4ff' }).addTo(map);
            state.isAnchorActive = true;
            document.getElementById('anchor-btn').classList.add('btn-active');
            showToast("⚓ Ankarvakt PÅ");
        } else {
            if (state.anchorCircle) map.removeLayer(state.anchorCircle);
            state.isAnchorActive = false;
            document.getElementById('anchor-btn').classList.remove('btn-active');
            showToast("Ankarvakt AV");
        }
    }

    function centerMap() { map.panTo(marker.getLatLng()); }
    function goHome() { map.flyTo([57.621, 11.934], 14); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = () => {
        document.getElementById('burn-low').value = localStorage.getItem('burnLow') || CONFIG.burnLow;
        document.getElementById('burn-high').value = localStorage.getItem('burnHigh') || CONFIG.burnHigh;
        if (navigator.getBattery) navigator.getBattery().then(b => {
            const u = () => els.batt.textContent = Math.round(b.level * 100) + "%";
            u(); b.onlevelchange = u;
        });
        navigator.geolocation.watchPosition(handlePosition, null, {enableHighAccuracy:true});
        map.on('click', e => {
            state.routePoints.push(e.latlng);
            routeLine.setLatLngs(state.routePoints);
            L.circleMarker(e.latlng, {radius:5, color:'#f1c40f', className:'route-dot'}).addTo(map);
            updateETA();
        });
    };
</script>
</body>
</html>
