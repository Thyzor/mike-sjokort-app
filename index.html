<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sagas Navigator - Route Saver V39</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --main-cyan: #00d4ff;
      --bg-dark: #001524;
      --panel-bg: rgba(0, 21, 36, 0.95);
      --sos-red: #ff0000;
      --ai-purple: #a855f7;
    }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: sans-serif; color: white; }
    #map { height: 100%; width: 100%; z-index: 1; }
    .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.3); }

    .heading-display {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 2000;
      background: var(--panel-bg); border: 2px solid var(--main-cyan); padding: 8px 25px; border-radius: 12px; text-align: center;
      min-width: 140px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    }
    .heading-number { font-size: 28px; font-weight: 900; font-family: monospace; display: block; }
    .heading-cardinal { font-size: 18px; color: var(--main-cyan); font-weight: bold; }

    .ai-panel {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 2000;
      background: rgba(15, 7, 32, 0.9); border: 1.5px solid var(--ai-purple); padding: 10px 20px; border-radius: 14px;
      width: 90%; max-width: 450px; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3); backdrop-filter: blur(8px);
      font-size: 11px; line-height: 1.4; box-sizing: border-box;
    }
    .ai-header { font-weight: bold; color: var(--ai-purple); display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .ai-status { color: #e9d5ff; font-style: italic; }

    .compass-container {
      position: absolute; bottom: 150px; left: 20px; z-index: 1001; width: 85px; height: 85px;
      background: rgba(0, 21, 36, 0.85); border-radius: 50%; border: 2px solid var(--main-cyan);
      display: flex; align-items: center; justify-content: center; pointer-events: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .compass-rose { width: 100%; height: 100%; position: relative; }
    .comp-mark { position: absolute; font-size: 12px; font-weight: 900; color: #64748b; }
    .n { top: 4px; left: 50%; transform: translateX(-50%); color: var(--sos-red); }
    .s { bottom: 4px; left: 50%; transform: translateX(-50%); }
    .o { right: 6px; top: 50%; transform: translateY(-50%); }
    .v { left: 6px; top: 50%; transform: translateY(-50%); }
    
    .compass-arrow {
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 32px solid var(--main-cyan);
      margin-left: -10px; margin-top: -20px;
      transform-origin: 10px 20px;
      transition: transform 0.2s ease-out;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .controls-left { position: absolute; top: 90px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
    .btn { background: var(--panel-bg); color: white; border: 1px solid var(--main-cyan); padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; min-width: 135px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .btn-sos { border-color: var(--sos-red); color: var(--sos-red); text-align: center; }
    .btn-ai { border-color: var(--ai-purple); color: #e9d5ff; font-weight: bold; }
    
    .route-select { background: #001524; color: var(--main-cyan); border: 1px solid var(--main-cyan); padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; width: 135px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

    /* PANEL FÖR ATT SPARA RUTTEN */
    .save-route-panel {
      position: absolute; top: 15px; right: 15px; z-index: 2000;
      background: var(--panel-bg); border: 1px solid var(--main-cyan); padding: 10px; border-radius: 12px;
      display: none; flex-direction: column; gap: 6px; width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .save-input { background: #0f172a; border: 1px solid var(--main-cyan); border-radius: 6px; color: white; padding: 6px; font-size: 11px; }

    .info-panel {
      position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
      background: var(--panel-bg); border: 1px solid var(--main-cyan); padding: 10px; border-radius: 20px;
      display: flex; gap: 10px; width: 95%; justify-content: space-around; font-size: 11px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .info-value { font-weight: 800; font-size: 14px; display: block; color: white; text-align: center; margin-top: 2px; }

    .modal { display: none; position: fixed; z-index: 3000; left: 50%; top: 50%; transform: translate(-50%, -50%); 
             background: #001524; color: white; padding: 20px; border-radius: 18px; width: 85%; max-width: 400px; border: 2px solid var(--main-cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .close-x { float: right; cursor: pointer; font-size: 24px; color: var(--main-cyan); font-weight: bold; margin-top: -5px; }
    
    .ai-modal { border-color: var(--ai-purple); }
    .chat-box { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 10px; padding: 12px; height: 220px; overflow-y: auto; margin-bottom: 10px; font-size: 12px; }
    .chat-msg { margin-bottom: 8px; line-height: 1.4; }
    .msg-user { color: var(--main-cyan); font-weight: bold; }
    .msg-ai { color: #e9d5ff; }

    .chat-input-row { display: flex; gap: 6px; align-items: center; }
    .chat-input { flex: 1; background: #0f172a; border: 1px solid var(--ai-purple); border-radius: 6px; color: white; padding: 10px; font-size: 12px; box-sizing: border-box; height: 38px; }
    
    .btn-mic { background: #1e1b4b; border: 1px solid var(--ai-purple); border-radius: 6px; color: white; cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .btn-mic.listening { background: var(--sos-red); border-color: white; }
    .btn-mute { background: #0f172a; border: 1px solid var(--ai-purple); border-radius: 6px; color: white; cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .btn-mute.muted { background: rgba(255, 0, 0, 0.2); border-color: var(--sos-red); color: var(--sos-red); }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="heading-display">
    <span id="heading-top" class="heading-number">000°</span>
    <span id="cardinal-top" class="heading-cardinal">N</span>
  </div>

  <div class="save-route-panel" id="save-route-panel">
    <span style="font-size:10px; font-weight:bold; color:var(--main-cyan);">SPARA AKTUELL RUTT</span>
    <input type="text" id="route-name-input" class="save-input" placeholder="Ruttens namn...">
    <button class="btn" style="min-width:100%; padding:6px; text-align:center;" onclick="saveCurrentRouteToArray()">💾 Spara Rutt</button>
  </div>

  <div class="ai-panel" id="ai-panel">
    <div class="ai-header">
      <span>☁️ SAGAS NAVIGATOR V39</span>
      <div>
        <span style="cursor:pointer; text-decoration: underline; margin-right: 10px;" onclick="promptApiKey()">⚙️ Nyckel</span>
        <span style="cursor:pointer; text-decoration: underline; color: var(--sos-red);" onclick="clearSavedKey()">🗑️ Nolla</span>
      </div>
    </div>
    <div class="ai-status" id="ai-status">Ansluter...</div>
  </div>

  <div class="compass-container">
    <div class="compass-rose">
      <span class="comp-mark n">N</span>
      <span class="comp-mark o">O</span>
      <span class="comp-mark s">S</span>
      <span class="comp-mark v">V</span>
      <div class="compass-arrow" id="compass-arrow"></div>
    </div>
  </div>

  <div class="controls-left">
    <button class="btn btn-sos" onclick="openSOS()">🆘 NÖD SOS</button>
    <button class="btn btn-ai" onclick="openModal('ai-chat-modal')">🔮 SAGA SKEPPARE</button>
    
    <select id="saved-routes-dropdown" class="route-select" onchange="loadSelectedRoute(this.value)">
      <option value="">📂 Hämta rutt...</option>
    </select>
    
    <button class="btn style-danger" style="border-color: #64748b; color: #94a3b8;" onclick="deleteActiveRoute()">🗑️ RADERA RUTT</button>
    <button class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn" onclick="clearRouteDisplay()">🗑️ RENSA SKÄRM</button>
    <button class="btn" onclick="toggleNight()">🌙 NATT/DAG</button>
  </div>

  <div class="info-panel">
    <div>DISTANS <span id="cur-nm" class="info-value">0.0 M</span></div>
    <div>KNOP <span id="speed" class="info-value">0.0</span></div>
    <div>VIND <span id="wind" class="info-value">3 m/s</span></div>
    <div>BRÄNSLE <span id="fuel" class="info-value">--</span></div>
    <div>ETA (7kn) <span id="eta" class="info-value">--:--</span></div>
  </div>

  <div id="ai-chat-modal" class="modal ai-modal">
    <span class="close-x" onclick="closeModal('ai-chat-modal')">×</span>
    <h3 style="color:var(--ai-purple); margin-top:0; margin-bottom:10px;">Saga Marine Copilot</h3>
    <div class="chat-box" id="ai-chat-box">
      <div class="chat-msg msg-ai" id="welcome-msg">Ansluter system...</div>
    </div>
    <div class="chat-input-row">
      <button class="btn-mute" id="ai-mute-btn" onclick="toggleMute()" title="Slå på/av röstsvar">🔊</button>
      <button class="btn-mic" id="ai-mic-btn" onclick="toggleVoiceRecognition()">🎙️</button>
      <input type="text" id="ai-user-input" class="chat-input" placeholder="Fråga Saga om skärgården..." onkeydown="if(event.key==='Enter') sendCustomAIMsg()">
      <button class="btn" style="min-width:50px; height:38px; padding:0; text-align:center; border-color:var(--ai-purple);" onclick="sendCustomAIMsg()">Sänd</button>
    </div>
  </div>

  <div id="sos-modal" class="modal">
    <span class="close-x" onclick="closeModal('sos-modal')">×</span>
    <h2 style="color:var(--sos-red); margin-top:0;">NÖDSITUATION</h2>
    <div id="sos-coords" style="font-family:monospace; font-size:18px; padding:15px; background:#1a0000; border-radius:10px; text-align:center; color:#ff8080;">--</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let state = { isNightMode: false, currentHeading: 0, isMuted: false };
    let recognition = null;
    let isListening = false;
    
    let plottedWaypoints = [];
    let plotterPolyline = null;

    const askimLat = 57.6186;
    const askimLng = 11.9320;

    const map = L.map("map", { zoomControl: false, attributionControl: false }).setView([askimLat, askimLng], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    L.tileLayer("https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(map);

    const boatMarker = L.marker([askimLat, askimLng]).addTo(map);

    function updateHeading(deg) {
      state.currentHeading = (deg + 360) % 360;
      document.getElementById("heading-top").textContent = String(Math.round(state.currentHeading)).padStart(3, '0') + "°";
      document.getElementById("compass-arrow").style.transform = `rotate(${state.currentHeading}deg)`;
    }

    map.on('click', function(e) {
      addWaypoint(e.latlng.lat, e.latlng.lng);
    });

    function addWaypoint(lat, lng) {
      const ptIndex = plottedWaypoints.length + 1;
      const wpMarker = L.circleMarker([lat, lng], { radius: 7, color: '#00d4ff', fillColor: '#001524', fillOpacity: 1, weight: 2 }).addTo(map);
      wpMarker.bindTooltip(String(ptIndex), { permanent: true, direction: 'center', className: 'wp-number-tooltip' });

      plottedWaypoints.push({ marker: wpMarker, latlng: L.latLng(lat, lng) });
      calculateGlobalRoute();
      
      // Visa spara-panelen när rutt skapas
      if(plottedWaypoints.length >= 2) {
        document.getElementById("save-route-panel").style.display = "flex";
      }
    }

    function calculateGlobalRoute() {
      const coordinates = plottedWaypoints.map(wp => wp.latlng);
      if (plotterPolyline) { plotterPolyline.setLatLngs(coordinates); } 
      else { plotterPolyline = L.polyline(coordinates, { color: '#00d4ff', weight: 4, dashArray: '5, 10', opacity: 0.9 }).addTo(map); }

      if (plottedWaypoints.length < 2) {
        document.getElementById("cur-nm").textContent = "0.0 M";
        document.getElementById("eta").textContent = "--:--";
        return;
      }

      let totalMeters = 0;
      for (let i = 0; i < coordinates.length - 1; i++) { totalMeters += coordinates[i].distanceTo(coordinates[i + 1]); }
      const totalNM = totalMeters / 1852;
      document.getElementById("cur-nm").textContent = totalNM.toFixed(1) + " M";
      document.getElementById("eta").textContent = Math.round((totalNM / 7) * 60) + " min";

      // Räkna ut kursen till första delmålet
      const lat1 = coordinates[0].lat * Math.PI / 180;
      const lat2 = coordinates[1].lat * Math.PI / 180;
      const dLng = (coordinates[1].lng - coordinates[0].lng) * Math.PI / 180;
      const y = Math.sin(dLng) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
      updateHeading(Math.atan2(y, x) * 180 / Math.PI);
    }

    /* ========================================================
       DATABASHANTERING (SPARA/LADDA RUTTER VIA LOCALSTORAGE)
       ======================================================== */
    
    function saveCurrentRouteToArray() {
      const nameInput = document.getElementById("route-name-input");
      const name = nameInput.value.trim();
      if (!name) { alert("Ange ett namn på rutten innan du sparar!"); return; }

      // Extrahera bara koordinaterna (lat, lng) från rutt-arrayen
      const coordsToSave = plottedWaypoints.map(wp => ({ lat: wp.latlng.lat, lng: wp.latlng.lng }));
      
      // Hämta befintliga rutter från minnet eller skapa en tom lista
      let savedRoutes = JSON.parse(localStorage.getItem("sagas_saved_routes")) || {};
      savedRoutes[name] = coordsToSave;
      
      // Spara tillbaka till webbläsaren
      localStorage.setItem("sagas_saved_routes", JSON.stringify(savedRoutes));
      
      nameInput.value = "";
      document.getElementById("save-route-panel").style.display = "none";
      alert(`Rutten "${name}" är nu sparad på din enhet!`);
      
      updateDropdownMenu();
    }

    function updateDropdownMenu() {
      const dropdown = document.getElementById("saved-routes-dropdown");
      dropdown.innerHTML = '<option value="">📂 Hämta rutt...</option>';
      
      let savedRoutes = JSON.parse(localStorage.getItem("sagas_saved_routes")) || {};
      for (const routeName in savedRoutes) {
        const opt = document.createElement("option");
        opt.value = routeName; opt.textContent = routeName;
        dropdown.appendChild(opt);
      }
    }

    function loadSelectedRoute(routeName) {
      if (!routeName) return;
      clearRouteDisplay();

      let savedRoutes = JSON.parse(localStorage.getItem("sagas_saved_routes")) || {};
      const targetCoords = savedRoutes[routeName];

      if (targetCoords && targetCoords.length > 0) {
        targetCoords.forEach(pt => addWaypoint(pt.lat, pt.lng));
        
        // Zooma in sjökortet över den laddade rutten
        const group = new L.featureGroup(plottedWaypoints.map(wp => wp.marker));
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    function deleteActiveRoute() {
      const dropdown = document.getElementById("saved-routes-dropdown");
      const activeName = dropdown.value;
      if (!activeName) { alert("Välj först en sparad rutt i menyn som du vill radera."); return; }

      if (confirm(`Är du säker på att du vill ta bort rutten "${activeName}" för alltid?`)) {
        let savedRoutes = JSON.parse(localStorage.getItem("sagas_saved_routes")) || {};
        delete savedRoutes[activeName];
        localStorage.setItem("sagas_saved_routes", JSON.stringify(savedRoutes));
        
        clearRouteDisplay();
        updateDropdownMenu();
        alert("Rutten är raderad.");
      }
    }

    function clearRouteDisplay() {
      plottedWaypoints.forEach(wp => map.removeLayer(wp.marker));
      plottedWaypoints = [];
      if (plotterPolyline) { map.removeLayer(plotterPolyline); plotterPolyline = null; }
      document.getElementById("cur-nm").textContent = "0.0 M";
      document.getElementById("eta").textContent = "--:--";
      document.getElementById("save-route-panel").style.display = "none";
      document.getElementById("saved-routes-dropdown").value = "";
      updateHeading(0);
    }

    function centerMap() {
      if (plottedWaypoints.length > 0) {
        const group = new L.featureGroup(plottedWaypoints.map(wp => wp.marker));
        map.fitBounds(group.getBounds());
      } else { map.setView(boatMarker.getLatLng(), 13); }
    }

    window.addEventListener('DOMContentLoaded', () => { checkKeyStatus(); updateDropdownMenu(); updateHeading(0); });

    /* ========================================================
       AI & SYSTEMFUNKTIONER (SAMMA SOM INNAN)
       ======================================================== */
    function checkKeyStatus() {
      let savedKey = localStorage.getItem("gemini_api_key");
      const statusEl = document.getElementById("ai-status");
      const welcomeEl = document.getElementById("ai-chat-box");
      if (savedKey && savedKey.trim().length > 10) {
        statusEl.textContent = `🟢 Saga Online`;
        welcomeEl.innerHTML = `<div class="chat-msg msg-ai"><b>Saga:</b> Ohoj Kapten! V39 med inbyggt ruttminne är startat. Klicka ut en rutt och spara den uppe i högra hörnet, så kommer jag ihåg den till nästa gång! ⚓🌊</div>`;
      } else {
        statusEl.textContent = "🔴 Ingen nyckel.";
        welcomeEl.innerHTML = `<div class="chat-msg msg-ai">Spara din API-nyckel så sätter vi igång.</div>`;
      }
    }

    function promptApiKey() { const key = prompt("Klistra in din Google Gemini API-nyckel:"); if (key) { localStorage.setItem("gemini_api_key", key.trim()); alert("Nyckeln sparad!"); checkKeyStatus(); } }
    function clearSavedKey() { localStorage.removeItem("gemini_api_key"); alert("Nollställt!"); checkKeyStatus(); }
    function toggleMute() { state.isMuted = !state.isMuted; const btn = document.getElementById("ai-mute-btn"); btn.textContent = state.isMuted ? "🔇" : "🔊"; btn.classList.toggle("muted", state.isMuted); if(state.isMuted && ('speechSynthesis' in window)) window.speechSynthesis.cancel(); }
    function appendChatMsg(sender, text) { const box = document.getElementById("ai-chat-box"); const cls = sender === "Du" ? "msg-user" : "msg-ai"; box.innerHTML += `<div class="chat-msg"><span class="${cls}">${sender}:</span> ${text}</div>`; box.scrollTop = box.scrollHeight; }
    
    function sendCustomAIMsg() {
      const input = document.getElementById("ai-user-input"); let text = input.value.trim(); if (!text) return;
      appendChatMsg("Du", text); input.value = "";
      callGeminiLiveAPI(text);
    }

    async function callGeminiLiveAPI(promptText) {
      let apiKey = localStorage.getItem("gemini_api_key"); if (!apiKey) { appendChatMsg("Saga", "❌ Lägg till en nyckel via inställningarna."); return; }
      document.getElementById("ai-status").textContent = "🔮 Saga tänker...";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`;
      let fullPrompt = `Du är Saga, en göteborgsk skipperska i en plotterapp. Svara kort (2-3 meningar) med go marin stämning. Kalla användaren 'Kapten'. Berätta gärna att de kan spara rutter nu!`;
      try {
        const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt + "\nFråga: " + promptText }] }] }) });
        if (!response.ok) return;
        const data = await response.json();
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          let res = data.candidates[0].content.parts[0].text; appendChatMsg("Saga", res); speakCleanText(res);
        }
      } catch (e) {} finally { document.getElementById("ai-status").textContent = "🟢 Saga klar."; }
    }

    function speakCleanText(t) { if (state.isMuted || !('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t.replace(/[\*\#\_`]/g, " ")); u.lang = 'sv-SE'; window.speechSynthesis.speak(u); }
    function toggleVoiceRecognition() { const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SpeechRecognition) return; if (!recognition) { recognition = new SpeechRecognition(); recognition.lang = "sv-SE"; recognition.onstart = () => { isListening = true; document.getElementById("ai-mic-btn").classList.add("listening"); }; recognition.onend = () => { isListening = false; document.getElementById("ai-mic-btn").classList.remove("listening"); }; recognition.onresult = (e) => { document.getElementById("ai-user-input").value = e.results[0][0].transcript; sendCustomAIMsg(); }; } if (isListening) recognition.stop(); else recognition.start(); }
    function toggleNight() { state.isNightMode = !state.isNightMode; document.body.classList.toggle("night-mode", state.isNightMode); }
    function openSOS() { const c = map.getCenter(); document.getElementById("sos-coords").textContent = `${c.lat.toFixed(4)}N, ${c.lng.toFixed(4)}O`; openModal("sos-modal"); }
    function openModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; if (id === 'ai-chat-modal' && ('speechSynthesis' in window)) window.speechSynthesis.cancel(); }
  </script>
</body>
</html>
