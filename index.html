<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Sjönävigering Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; transition: filter 0.5s; }
        
        /* Nattläge-filter */
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) sepia(100%) saturate(500%) hue-rotate(-50deg); }
        
        #info-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0, 21, 36, 0.9); color: #00d4ff; padding: 15px 20px; border-radius: 30px; border: 1px solid #00d4ff; display: flex; gap: 15px; backdrop-filter: blur(5px); }
        
        /* Varningsskylt */
        #hazard-warning { 
            display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: red; color: white; padding: 20px; border-radius: 10px; 
            font-weight: bold; animation: blink 1s infinite; border: 4px solid white;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .btn { position: absolute; z-index: 1000; background: #00d4ff; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #night-btn { top: 10px; left: 10px; }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ VARNING: GRUND/HINDER NÄRA</div>
<button id="night-btn" class="btn" onclick="toggleNight()">Nattläge AV/PÅ</button>

<div id="info-panel">
    <div><small>KNOP</small><br><span id="speed">0.0</span></div>
    <div><small>KURS</small><br><span id="course">---°</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 13);
    
    // Baskartor
    var baseMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    var boatIcon = L.divIcon({ className: 'boat', html: '<div style="background:red; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>' });
    var marker = L.marker([0,0], {icon: boatIcon}).addTo(map);

    function toggleNight() { document.body.classList.toggle('night-mode'); }

    // Enkel varnings-logik (Simulerad - kräver egentligen WFS-data för att vara 100% exakt)
    function checkHazards(lat, lon) {
        // Här kan man i framtiden lägga in en lista på koordinater för kända grynnor i Askim
        // Just nu visar vi bara hur varningen ser ut om man kommer för nära en testpunkt
        var dangerPoint = {lat: 57.61, lon: 11.90}; // Exempelpunkt
        var dist = map.distance([lat, lon], [dangerPoint.lat, dangerPoint.lon]);
        
        if(dist < 100) { // Varna om närmare än 100 meter
            document.getElementById('hazard-warning').style.display = 'block';
        } else {
            document.getElementById('hazard-warning').style.display = 'none';
        }
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(function(p) {
            var lat = p.coords.latitude;
            var lon = p.coords.longitude;
            marker.setLatLng([lat, lon]);
            map.panTo([lat, lon]);
            
            if(p.coords.speed) document.getElementById('speed').innerHTML = (p.coords.speed * 1.94).toFixed(1);
            if(p.coords.heading) document.getElementById('course').innerHTML = Math.round(p.coords.heading) + "°";
            
            checkHazards(lat, lon);
        }, null, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
