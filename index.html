<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator Pro+</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        #info-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0, 21, 36, 0.92); color: #00d4ff; 
            padding: 12px 20px; border-radius: 25px; border: 1px solid #00d4ff; 
            display: flex; gap: 12px; backdrop-filter: blur(8px); pointer-events: none;
        }
        .info-item { text-align: center; min-width: 48px; }
        .info-label { font-size: 8px; text-transform: uppercase; opacity: 0.7; }
        .info-value { font-size: 17px; font-weight: 800; }
        .controls { position: absolute; z-index: 1000; display: flex; flex-direction: column; gap: 6px; top: 10px; left: 10px; }
        .btn { background: #ffffff; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        #hazard-warning { display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); z-index: 2000; background: #ff1a1a; color: white; padding: 20px; border-radius: 12px; font-weight: bold; border: 4px solid white; }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ GRUND NÄRA!<br><small id="dist-text"></small></div>
<div class="controls">
    <button class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn" style="background:#ff5252; color:white;" onclick="clearRoute()">🗑️ RENSA</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Kurs</div><div id="course" class="info-value">---°</div></div>
    <div class="info-item"><div class="info-label">Djup</div><div id="depth" class="info-value">--</div><div style="font-size: 7px;">meter</div></div>
    <div class="info-item"><div class="info-label">Vind</div><div id="wind-speed" class="info-value">--</div><div style="font-size: 7px;">m/s</div></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const WEATHER_API_KEY = 'e48efe6e08a9c83ecbd88fbb817431b9'; 
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    var boatIcon = L.divIcon({ html: '<div style="width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:25px solid #ff3e3e;"></div>', iconSize: [20, 25], iconAnchor: [10, 12] });
    var marker = L.marker([0,0], {icon: boatIcon}).addTo(map);

    async function updateWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric`);
            const data = await res.json();
            if(data.wind) document.getElementById('wind-speed').innerText = data.wind.speed.toFixed(1);
        } catch (e) { console.log(e); }
    }

    async function updateDepthData(lat, lon) {
        // Bredare sökning: letar efter alla noder och vägar med djuptaggar
        const query = `[out:json][timeout:25];(node["seamark:type"="depth_area"](around:800,${lat},${lon});node["seamark:depth"](around:800,${lat},${lon});way["seamark:type"="depth_area"](around:800,${lat},${lon}););out center;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            let bestDepth = "--";
            let minDistance = 1000;

            data.elements.forEach(el => {
                let dLat = el.lat || (el.center ? el.center.lat : null);
                let dLon = el.lon || (el.center ? el.center.lon : null);
                
                if (dLat && dLon && el.tags && (el.tags["seamark:depth"] || el.tags["depth"])) {
                    let dist = map.distance([lat, lon], [dLat, dLon]);
                    if (dist < minDistance) {
                        minDistance = dist;
                        bestDepth = el.tags["seamark:depth"] || el.tags["depth"];
                    }
                }
            });
            document.getElementById('depth').innerText = bestDepth;
        } catch (e) { console.log("Djupfel:", e); }
    }

    navigator.geolocation.watchPosition(function(p) {
        let lat = p.coords.latitude;
        let lon = p.coords.longitude;
        marker.setLatLng([lat, lon]);
        if(p.coords.speed) document.getElementById('speed').innerText = (p.coords.speed * 1.9438).toFixed(1);
        if(p.coords.heading) document.getElementById('course').innerText = Math.round(p.coords.heading) + "°";
    }, null, { enableHighAccuracy: true });

    // Uppdatera varannan minut
    setInterval(() => {
        let pos = marker.getLatLng();
        if(pos.lat !== 0) { updateWeather(pos.lat, pos.lng); updateDepthData(pos.lat, pos.lng); }
    }, 120000);

    function centerMap() { map.panTo(marker.getLatLng()); }
</script>
</body>
</html>
