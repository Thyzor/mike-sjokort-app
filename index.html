<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator Master Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; transition: filter 0.5s; }
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) opacity(0.8) sepia(100%) saturate(500%) hue-rotate(-50deg); }
        
        #info-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0, 21, 36, 0.94); color: #00d4ff; 
            padding: 12px 18px; border-radius: 25px; border: 1px solid #00d4ff; 
            display: flex; gap: 12px; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }
        .info-item { text-align: center; min-width: 45px; }
        .info-label { font-size: 8px; text-transform: uppercase; opacity: 0.7; }
        .info-value { font-size: 17px; font-weight: 800; }

        .controls { position: absolute; z-index: 1000; display: flex; flex-direction: column; gap: 6px; top: 10px; left: 10px; }
        .top-right { position: absolute; z-index: 1000; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        
        .btn { 
            background: #ffffff; border: none; padding: 10px 14px; border-radius: 8px; 
            font-weight: 900; cursor: pointer; font-size: 11px; color: #000; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.4); text-transform: uppercase;
        }
        .btn-active { background: #ff5252 !important; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #settings-modal {
            display: none; position: fixed; z-index: 3000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: #001b2e; color: white; padding: 20px; border-radius: 15px; border: 2px solid #00d4ff; width: 85%; max-width: 300px;
        }
        #settings-modal input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        
        #hazard-warning { 
            display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: #ff1a1a; color: white; padding: 20px; border-radius: 12px; 
            font-weight: bold; font-size: 18px; text-align: center; border: 4px solid white; animation: pulse 0.5s infinite;
        }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ GRUND NÄRA!<br><small id="dist-text"></small></div>

<div id="settings-modal">
    <h3 style="margin-top:0;">Motorinställning</h3>
    <label style="font-size:12px;">Lågfart l/dist (t.ex. 0.2):</label>
    <input type="number" id="burn-low" value="0.2" step="0.1">
    <label style="font-size:12px;">Marschfart l/dist (t.ex. 0.5):</label>
    <input type="number" id="burn-high" value="0.5" step="0.1">
    <button class="btn" style="background:#4CAF50; color:white; width:100%; margin-top:10px;" onclick="closeSettings()">SPARA</button>
</div>

<div class="top-right">
    <button id="audio-btn" class="btn" style="background:#4CAF50; color:white;" onclick="enableAudio()">🔊 AKTIVERA LJUD</button>
    <button id="mute-btn" class="btn" style="display:none; background:rgba(0,0,0,0.6); color:white;" onclick="toggleMute()">🔇 LJUD PÅ</button>
    <button class="btn" style="background:#9c27b0; color:white;" onclick="openSettings()">⚙️ MOTOR</button>
    <button id="anchor-btn" class="btn" onclick="toggleAnchor()">⚓ ANKARVAKT</button>
</div>

<div class="controls">
    <button class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn" style="background:#4ec3f7;" onclick="toggleNight()">🌙 NATT-LÄGE</button>
    <button class="btn" style="background:#ff5252; color:white;" onclick="clearRoute()">🗑️ RENSA RUTT</button>
    <button class="btn" style="background:#e91e63; color:white;" onclick="saveLog()">📝 LOGG</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Liter</div><div id="fuel" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Djup</div><div id="depth" class="info-value">--</div></div>
    <div class="info-item"><div class="info-label">Vind</div><div id="wind-speed" class="info-value">--</div></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const WEATHER_API_KEY = 'e48efe6e08a9c83ecbd88fbb817431b9'; 
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    var boatIcon = L.divIcon({ 
        html: '<div id="boat-dir" style="width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:25px solid #ff3e3e;filter:drop-shadow(0 0 2px black);"></div>', 
        iconSize: [20, 25], iconAnchor: [10, 12] 
    });
    var marker = L.marker([0,0], {icon: boatIcon}).addTo(map);
    
    // Rutt & Tracking
    var routePoints = [], routeLine = L.polyline([], {color:'#f1c40f', weight:4, dashArray:'10,10'}).addTo(map);
    var trackLine = L.polyline([], {color:'#00d4ff', weight:3, opacity:0.6}).addTo(map);
    
    var lastPos = null, totalFuel = 0, burnLow = 0.2, burnHigh = 0.5;
    var audioCtx = null, audioEnabled = false, isMuted = false, hazards = [], isAnchorActive = false, anchorPos = null, anchorCircle = null;

    // Planera rutt
    map.on('click', e => { 
        routePoints.push(e.latlng); 
        routeLine.setLatLngs(routePoints); 
        L.circleMarker(e.latlng, {radius:5, color:'#f1c40f', fillOpacity:1}).addTo(map); 
    });

    function clearRoute() { 
        routePoints = []; routeLine.setLatLngs([]); 
        map.eachLayer(l => { if(l instanceof L.CircleMarker && l !== marker) map.removeLayer(l); }); 
    }

    function openSettings() { document.getElementById('settings-modal').style.display = 'block'; }
    function closeSettings() { 
        burnLow = parseFloat(document.getElementById('burn-low').value); 
        burnHigh = parseFloat(document.getElementById('burn-high').value); 
        document.getElementById('settings-modal').style.display = 'none'; 
    }

    function enableAudio() { audioCtx = new AudioContext(); audioEnabled = true; document.getElementById('audio-btn').style.display = 'none'; document.getElementById('mute-btn').style.display = 'block'; beep(440); }
    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔊 LJUD AV" : "🔇 LJUD PÅ"; }
    function beep(f) { if(!audioEnabled || isMuted) return; let o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.2); }

    function toggleAnchor() {
        isAnchorActive = !isAnchorActive;
        if(isAnchorActive) {
            anchorPos = marker.getLatLng();
            anchorCircle = L.circle(anchorPos, {radius:35, color:'#ff5252', fillOpacity:0.1}).addTo(map);
            document.getElementById('anchor-btn').classList.add('btn-active');
        } else {
            if(anchorCircle) map.removeLayer(anchorCircle);
            document.getElementById('anchor-btn').classList.remove('btn-active');
        }
    }

    function saveLog() { alert(`📝 LOGG\nTid: ${new Date().toLocaleTimeString()}\nBränsle: ${totalFuel.toFixed(1)} L`); }

    async function updateData() {
        let p = marker.getLatLng(); if(p.lat === 0) return;
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${p.lat}&lon=${p.lng}&appid=${WEATHER_API_KEY}&units=metric`)
            .then(r => r.json()).then(d => { if(d.wind) document.getElementById('wind-speed').innerText = d.wind.speed.toFixed(1); });

        fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent('[out:json];(node["seamark:type"](around:1200,'+p.lat+','+p.lng+');node["seamark:depth"](around:1200,'+p.lat+','+p.lng+'););out center;')}`)
            .then(r => r.json()).then(d => {
                hazards = d.elements;
                let bD = "--", mD = 1500;
                d.elements.forEach(el => {
                    let l = el.lat || (el.center ? el.center.lat : null);
                    if(l && el.tags && (el.tags["seamark:depth"] || el.tags["depth"])) {
                        let dist = map.distance([p.lat, p.lng], [l, (el.lon || el.center.lon)]);
                        if(dist < mD) { mD = dist; bD = el.tags["seamark:depth"] || el.tags["depth"]; }
                    }
                });
                document.getElementById('depth').innerText = bD;
            });
    }

    navigator.geolocation.watchPosition(p => {
        let cur = L.latLng(p.coords.latitude, p.coords.longitude);
        marker.setLatLng(cur); trackLine.addLatLng(cur);
        let knt = p.coords.speed * 1.9438 || 0;
        document.getElementById('speed').innerText = knt.toFixed(1);

        if(lastPos) {
            let d = cur.distanceTo(lastPos) / 1852;
            let burn = (knt > 4) ? burnHigh : burnLow;
            totalFuel += (d * burn);
            document.getElementById('fuel').innerText = totalFuel.toFixed(1);
        }
        lastPos = cur;

        if(isAnchorActive && anchorPos.distanceTo(cur) > 35) beep(1200);
        if(p.coords.heading) document.getElementById('boat-dir').style.transform = `rotate(${p.coords.heading}deg)`;

        let near = 1000;
        hazards.forEach(h => {
            if(h.tags && (h.tags["seamark:type"] === "rock" || h.tags["seamark:hazard"])) {
                let d = map.distance([cur.lat, cur.lng], [h.lat || h.center.lat, h.lon || h.center.lon]);
                if(d < near) near = d;
            }
        });
        if(near < 150) { document.getElementById('hazard-warning').style.display='block'; document.getElementById('dist-text').innerText = Math.round(near)+"m"; beep(880); }
        else document.getElementById('hazard-warning').style.display='none';
    }, null, { enableHighAccuracy: true });

    setInterval(updateData, 45000);
    function centerMap() { map.panTo(marker.getLatLng()); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
</script>
</body>
</html>
