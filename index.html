<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator - Bränsle Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.2); }
        
        /* Bottenpanel */
        #info-panel { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0, 21, 36, 0.9); color: #00d4ff; 
            padding: 12px; border-radius: 20px; border: 1px solid #00d4ff; 
            display: flex; gap: 8px; backdrop-filter: blur(5px); width: 90%; max-width: 420px;
            justify-content: space-around; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .info-item { text-align: center; }
        .info-label { font-size: 7px; text-transform: uppercase; opacity: 0.8; margin-bottom: 2px; }
        .info-value { font-size: 14px; font-weight: 800; }

        /* Knappar */
        .controls-left { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .controls-right { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn { background: #ffffff; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-red { background: #ff5252; color: white; }
        .btn-green { background: #4CAF50; color: white; }
        .btn-purple { background: #9c27b0; color: white; }

        /* Återställd Bränsle-meny med förklaringar */
        #settings-modal {
            display: none; position: fixed; z-index: 3000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: #001b2e; color: white; padding: 20px; border-radius: 15px; border: 2px solid #00d4ff; width: 85%; max-width: 320px;
        }
        .fuel-guide-box { 
            background: rgba(0, 212, 255, 0.1); padding: 12px; border-radius: 10px; 
            font-size: 11px; margin: 10px 0; border-left: 4px solid #00d4ff; line-height: 1.4;
        }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 5px; border: none; font-size: 16px; }

        #hazard-warning { 
            display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: #ff1a1a; color: white; padding: 15px; border-radius: 10px; 
            font-weight: bold; text-align: center; border: 2px solid white;
        }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ GRUND NÄRA!</div>

<div id="settings-modal">
    <h3 style="margin:0; color:#00d4ff;">⛽ Bränsleberäkning</h3>
    <p style="font-size:12px; opacity:0.8; margin-top:5px;">Ange förbrukning i <b>liter per sjömil</b>.</p>
    
    <div class="fuel-guide-box">
        <b>💡 Riktvärden för din motor:</b><br>
        • Johnson 8hk (Lågfart): <b>0.2 - 0.3</b><br>
        • Johnson 8hk (Marsch): <b>0.4 - 0.5</b><br>
        <small><i>Större båtar (50hk+) ligger ofta på 0.8 - 1.2</i></small>
    </div>

    <label style="font-size:12px; font-weight:bold;">Lågfart (Under 4 knop):</label>
    <input type="number" id="burn-low" value="0.2" step="0.1">
    
    <label style="font-size:12px; font-weight:bold;">Marschfart (Över 4 knop):</label>
    <input type="number" id="burn-high" value="0.5" step="0.1">
    
    <button class="btn btn-green" style="width:100%; padding:15px;" onclick="closeSettings()">SPARA INSTÄLLNINGAR</button>
</div>

<div class="controls-left">
    <button class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn" onclick="toggleNight()">🌙 NATT-LÄGE</button>
    <button class="btn btn-red" onclick="resetFuel()">⛽ NOLLA LITER</button>
</div>

<div class="controls-right">
    <button id="audio-btn" class="btn btn-green" onclick="enableAudio()">🔊 LJUD PÅ</button>
    <button class="btn btn-purple" onclick="openSettings()">⛽ MOTOR & BRÄNSLE</button>
    <button class="btn" onclick="toggleAnchor()">⚓ ANKARVAKT</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Liter Totalt</div><div id="fuel" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Kurs</div><div id="heading" class="info-value">0°</div></div>
    <div class="info-item"><div class="info-label">Djup</div><div id="depth" class="info-value">--</div></div>
    <div class="info-item"><div class="info-label">Vind</div><div id="wind" class="info-value">--</div></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = 'e48efe6e08a9c83ecbd88fbb817431b9';
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 15);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    var boatIcon = L.divIcon({
        className: 'custom-icon',
        html: '<div id="boat-arrow" style="width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:25px solid #ff3e3e;transform:rotate(0deg);transition:transform 0.5s;"></div>',
        iconSize: [20, 25], iconAnchor: [10, 12]
    });
    var marker = L.marker([57.62, 11.93], {icon: boatIcon}).addTo(map);
    
    var lastPos = null, totalFuel = 0, burnLow = 0.2, burnHigh = 0.5;
    var audioCtx = null;

    function openSettings() { document.getElementById('settings-modal').style.display = 'block'; }
    function closeSettings() { 
        burnLow = parseFloat(document.getElementById('burn-low').value);
        burnHigh = parseFloat(document.getElementById('burn-high').value);
        document.getElementById('settings-modal').style.display = 'none'; 
    }
    function resetFuel() { totalFuel = 0; document.getElementById('fuel').innerText = "0.0"; }

    async function fetchEnv(lat, lon) {
        try {
            const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
            const d = await r.json();
            if(d.wind) document.getElementById('wind').innerText = d.wind.speed.toFixed(1);
        } catch(e) {}
    }

    navigator.geolocation.watchPosition(p => {
        let cur = L.latLng(p.coords.latitude, p.coords.longitude);
        marker.setLatLng(cur);
        
        let knt = p.coords.speed * 1.9438 || 0;
        let hdg = p.coords.heading || 0;

        document.getElementById('speed').innerText = knt.toFixed(1);
        document.getElementById('heading').innerText = Math.round(hdg) + "°";
        document.getElementById('boat-arrow').style.transform = `rotate(${hdg}deg)`;

        if(lastPos) {
            let d = cur.distanceTo(lastPos) / 1852;
            totalFuel += (d * (knt > 4 ? burnHigh : burnLow));
            document.getElementById('fuel').innerText = totalFuel.toFixed(1);
        }
        lastPos = cur;
        
        if(!document.getElementById('wind').innerText || Math.random() > 0.98) fetchEnv(cur.lat, cur.lng);
    }, null, { enableHighAccuracy: true });

    function centerMap() { map.panTo(marker.getLatLng()); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
    function enableAudio() { audioCtx = new AudioContext(); document.getElementById('audio-btn').style.opacity = '0.5'; }
    function toggleAnchor() { alert("Ankarvakt aktiverad!"); }
</script>
</body>
</html>
