<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mike's Navigator Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #001524; font-family: sans-serif; }
        #map { height: 100%; width: 100%; transition: filter 0.5s; }
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) opacity(0.8) sepia(100%) saturate(500%) hue-rotate(-50deg); }
        
        #info-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0, 21, 36, 0.94); color: #00d4ff; 
            padding: 12px 18px; border-radius: 25px; border: 1px solid #00d4ff; 
            display: flex; gap: 12px; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }
        .info-item { text-align: center; min-width: 48px; }
        .info-label { font-size: 8px; text-transform: uppercase; opacity: 0.7; }
        .info-value { font-size: 17px; font-weight: 800; }

        .controls { position: absolute; z-index: 1000; display: flex; flex-direction: column; gap: 6px; top: 10px; left: 10px; }
        .top-right { position: absolute; z-index: 1000; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        
        .btn { 
            background: #ffffff; border: none; padding: 10px 14px; border-radius: 8px; 
            font-weight: 900; cursor: pointer; font-size: 11px; color: #000; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.4); text-transform: uppercase;
        }
        .btn-active { background: #ff5252 !important; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #hazard-warning { 
            display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: #ff1a1a; color: white; padding: 20px; border-radius: 12px; 
            font-weight: bold; font-size: 18px; text-align: center; border: 4px solid white;
        }
    </style>
</head>
<body>

<div id="hazard-warning">⚠️ GRUND NÄRA!<br><small id="dist-text"></small></div>

<div class="top-right">
    <button id="audio-btn" class="btn" style="background:#4CAF50; color:white;" onclick="enableAudio()">🔊 AKTIVERA SYSTEM</button>
    <button id="mute-btn" class="btn" style="display:none; background:rgba(0,0,0,0.6); color:white;" onclick="toggleMute()">🔇 LJUD PÅ</button>
    <button id="anchor-btn" class="btn" onclick="toggleAnchor()">⚓ ANKARVAKT: AV</button>
    <button class="btn" style="background:#ff9800; color:white;" onclick="window.open('https://www.marinetraffic.com/', '_blank')">🚢 AIS-TRAFIK</button>
</div>

<div class="controls">
    <button class="btn" onclick="centerMap()">📍 CENTRERA</button>
    <button class="btn" style="background:#4ec3f7;" onclick="toggleNight()">🌙 NATT-LÄGE</button>
    <button class="btn" style="background:#e91e63; color:white;" onclick="saveLog()">📝 LOGGA PLATS</button>
    <button class="btn" style="background:#4CAF50; color:white;" onclick="updateAll()">🔄 UPPDATERA DATA</button>
</div>

<div id="info-panel">
    <div class="info-item"><div class="info-label">Knop</div><div id="speed" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Liter</div><div id="fuel" class="info-value">0.0</div></div>
    <div class="info-item"><div class="info-label">Djup</div><div id="depth" class="info-value">--</div><div style="font-size:7px">m</div></div>
    <div class="info-item"><div class="info-label">Vind</div><div id="wind-speed" class="info-value">--</div><div style="font-size:7px">m/s</div></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const WEATHER_API_KEY = 'e48efe6e08a9c83ecbd88fbb817431b9'; 
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([57.62, 11.93], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    var boatIcon = L.divIcon({ 
        html: '<div id="boat-dir" style="width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:25px solid #ff3e3e;filter:drop-shadow(0 0 2px black);"></div>', 
        iconSize: [20, 25], iconAnchor: [10, 12] 
    });
    var marker = L.marker([0,0], {icon: boatIcon}).addTo(map);
    
    // Tracking & Stats
    var track = L.polyline([], {color: '#00d4ff', weight: 4, opacity: 0.7}).addTo(map);
    var lastPos = null, totalDist = 0, anchorPos = null, anchorCircle = null;
    var audioCtx = null, audioEnabled = false, isMuted = false, hazards = [], isAnchorActive = false;

    function enableAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
        document.getElementById('audio-btn').style.display = 'none';
        document.getElementById('mute-btn').style.display = 'block';
        beep(440);
    }

    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔊 LJUD AV" : "🔇 LJUD PÅ"; }
    function beep(freq = 880) { if (!audioEnabled || isMuted) return; var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }

    function toggleAnchor() {
        isAnchorActive = !isAnchorActive;
        const btn = document.getElementById('anchor-btn');
        if(isAnchorActive) {
            anchorPos = marker.getLatLng();
            anchorCircle = L.circle(anchorPos, {radius: 35, color: '#ff5252', fillOpacity: 0.1}).addTo(map);
            btn.innerText = "⚓ VAKT: AKTIV"; btn.classList.add('btn-active');
        } else {
            if(anchorCircle) map.removeLayer(anchorCircle);
            btn.innerText = "⚓ ANKARVAKT: AV"; btn.classList.remove('btn-active');
        }
    }

    function saveLog() {
        const p = marker.getLatLng();
        const v = document.getElementById('wind-speed').innerText;
        alert(`📝 LOGG SPARAD\nTid: ${new Date().toLocaleTimeString()}\nPos: ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}\nVind: ${v} m/s`);
    }

    async function updateAll() {
        let pos = marker.getLatLng();
        if(pos.lat === 0) return;
        
        // Vind
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.lat}&lon=${pos.lng}&appid=${WEATHER_API_KEY}&units=metric`)
            .then(r => r.json()).then(data => { if(data.wind) document.getElementById('wind-speed').innerText = data.wind.speed.toFixed(1); });

        // Djup & Hinder
        const query = `[out:json][timeout:25];(node["seamark:type"](around:1200,${pos.lat},${pos.lng});node["seamark:depth"](around:1200,${pos.lat},${pos.lng});way["seamark:type"](around:1200,${pos.lat},${pos.lng}););out center;`;
        fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
            .then(r => r.json()).then(data => {
                hazards = data.elements;
                let bestD = "--", minD = 1500;
                data.elements.forEach(el => {
                    let dLat = el.lat || (el.center ? el.center.lat : null);
                    if(dLat && el.tags && (el.tags["seamark:depth"] || el.tags["depth"])) {
                        let d = map.distance([pos.lat, pos.lng], [dLat, (el.lon || el.center.lon)]);
                        if(d < minD) { minD = d; bestD = el.tags["seamark:depth"] || el.tags["depth"]; }
                    }
                });
                document.getElementById('depth').innerText = bestD;
            });
    }

    navigator.geolocation.watchPosition(function(p) {
        let cur = L.latLng(p.coords.latitude, p.coords.longitude);
        marker.setLatLng(cur);
        track.addLatLng(cur);

        // Bränsle & Distans (1.2 liter per distansminut)
        if(lastPos) {
            let dist = cur.distanceTo(lastPos) / 1852;
            totalDist += dist;
            document.getElementById('fuel').innerText = (totalDist * 1.2).toFixed(1);
        }
        lastPos = cur;

        // Ankarvakt-check
        if(isAnchorActive && anchorPos.distanceTo(cur) > 35) { beep(1200); document.getElementById('dist-text').innerText = "DRIVIT UTANFÖR RADIE!"; }

        // Kurs & Fart
        if(p.coords.heading !== null) { 
            document.getElementById('boat-dir').style.transform = `rotate(${p.coords.heading}deg)`; 
            document.getElementById('course').innerText = Math.round(p.coords.heading) + "°"; 
        }
        document.getElementById('speed').innerText = (p.coords.speed * 1.9438 || 0).toFixed(1);
        
        // Hinder-check
        let nearH = 1000;
        hazards.forEach(h => {
            if(h.tags && (h.tags["seamark:type"] === "rock" || h.tags["seamark:hazard"])) {
                let d = map.distance([cur.lat, cur.lng], [h.lat || h.center.lat, h.lon || h.center.lon]);
                if(d < nearH) nearH = d;
            }
        });
        if(nearH < 150) { document.getElementById('hazard-warning').style.display='block'; document.getElementById('dist-text').innerText = Math.round(nearH)+"m till hinder"; beep(880); }
        else { document.getElementById('hazard-warning').style.display='none'; }

    }, null, { enableHighAccuracy: true });

    setInterval(updateAll, 45000);
    function centerMap() { map.panTo(marker.getLatLng()); }
    function toggleNight() { document.body.classList.toggle('night-mode'); }
</script>
</body>
</html>
